meta:
  description: Memory compression and preference extraction prompts
  version: v1.0

prompts:
  compression:
    content: |
      请将以下对话历史压缩为一段简洁的中文摘要（不超过500字），保留关键信息：
      - 用户关注的博主和标的
      - 已执行的操作（获取资料、采集推文、分析等）
      - 重要的分析结论
      - 用户表达的偏好

      {{ existing_summary }}

      对话内容:
      {{ conversation }}

      请输出摘要：
  preference_extraction:
    content: |
      根据用户最新消息，提取客观事实和主观偏好。请以 json 格式输出。

      【profile - 客观事实，基本不变】
      - name: 真实姓名（如"张三"、"曹俊"）
      - nickname: 昵称/网名
      - occupation: 职业/身份（"量化交易员"、"散户"、"基金经理"、"研究员"、"程序员"）
      - birthday: 生日 (ISO 日期 YYYY-MM-DD)
      - location: 所在地（"北京"、"上海"、"杭州"）

      【preferences - 主观偏好，可变动】
      - watch_bloggers: 新关注的博主 Twitter handle（不含@）
      - unwatch_bloggers: 取消关注的博主
      - interested_tickers: 新关注的标的/代币（大写如 BTC, ETH, MRVL）
      - reply_style: "concise" 或 "detailed"
      - investment_style: 投资风格（"短线激进"、"长线价值"、"偏好半导体"、"保守型"）

      如果消息中没有任何相关表达，所有字段返回空。
